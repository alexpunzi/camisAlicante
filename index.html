<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CAMIS ALICANTE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <h1>CAMIS ALICANTE</h1>
    <div class="cart">🛒 0</div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <h2>Viste el fútbol</h2>
    <p>Camisetas normales por 20€ y retro por 30€</p>
    <button>Explorar colección</button>
  </section>

  <!-- Productos -->
  <section class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
      <h3>Camiseta FC Barcelona 24/25</h3>
      <p class="type">Normal</p>
      <p class="price">20€</p>
      <button>Añadir al carrito</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1599058917765-a780eda07a3e">
      <h3>Camiseta Real Madrid 98/99</h3>
      <p class="type">Retro</p>
      <p class="price">30€</p>
      <button>Añadir al carrito</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1589187155478-96fef4c55c4b">
      <h3>Camiseta PSG 24/25</h3>
      <p class="type">Normal</p>
      <p class="price">20€</p>
      <button>Añadir al carrito</button>
    </div>

  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 CAMIS ALICANTE</p>
    <p>@camisalicante</p>
  </footer>

</body>
</html>
