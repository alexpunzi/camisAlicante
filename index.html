<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Camisetas de fútbol retro y clásicas en Alicante. Iconos del fútbol para verdaderos aficionados.">

  <title>CAMIS ALICANTE | Catálogo de camisetas</title>

  <link rel="icon" href="camisAlicanteIcono.ico">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
  <a href="#" class="logo-link" aria-label="Ir al inicio">
    <div class="logo">
      <img src="img/camisAlicanteSinFondo.png" class="logo-img" alt="Logo de Camis Alicante">
      CAMIS ALICANTE
    </div>
  </a>
</header>

<main>

  <section class="hero">
    <div class="hero-content">
      <h1>Iconos del fútbol</h1>
      <p>Camisetas con historia para verdaderos aficionados</p>
      <a href="#coleccion" class="btn-primary" role="button">
        Ver colección
      </a>
    </div>
  </section>

  <section class="products" id="coleccion">
    <h2 class="section-title">Nuestra Colección</h2>

    <div class="grid-container">

      <article class="card">
        <div class="img-container">
          <img src="img/real-madrid-1994-1996.jpeg"
               alt="Camiseta retro del Real Madrid temporada 1994-1996"
               loading="lazy">
          <span class="badge retro">Retro</span>
        </div>
        <div class="card-info">
          <h3>Real Madrid 94-96</h3>
          <p class="price">28€</p>
          <span class="catalogo-text">Disponible</span>
        </div>
      </article>

    </div>
  </section>

</main>

<footer class="footer">
  <p>© 2026 CAMIS ALICANTE</p>
  <p>
    <a href="https://instagram.com/camisalicante"
       target="_blank"
       rel="noopener noreferrer"
       aria-label="Visita nuestro perfil de Instagram">
      @camisalicante
    </a>
  </p>
</footer>

</body>
</html>
